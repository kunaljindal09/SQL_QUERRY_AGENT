# Locust Configuration File for SQL Query Agent

[general]
# Configuration for load testing

[locustfile]
# Path to load test file
locustfile = backend/tests/load_tests.py

[host]
# Default host to load test
host = http://localhost:8000

[users]
# Number of concurrent users to simulate
# Can be overridden with: locust --users 100
default = 10

[spawn]
# How many users to add per second
# Can be overridden with: locust --spawn-rate 10
spawn_rate = 5

[run]
# How long to run the test
# Can be overridden with: locust --run-time 5m
run_time = 10m

[reporting]
# Enable CSV reporting
csv = results
csv_prefix = loadtest

# Output directory for reports
output_dir = test-results/load-tests

[display]
# Update interval for stats (seconds)
stats_history_enabled = true
print_stats_on_quit = true

[headless]
# Run in headless mode (no web UI)
headless = false

[web]
# Web UI settings
web_port = 8089

# Advanced settings
[distributed]
# For distributed load testing across multiple machines
# master = false
# slave_bind_host = 0.0.0.0

[advanced]
# Connection timeout (seconds)
connection_timeout = 30

# Response timeout (seconds)
response_timeout = 60

# Don't stop on failure
stop_on_failure = false

# Profile
# profile = true

# Log level
# log_level = INFO
