<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100vh;
        border: none;
      }
    </style>
  </head>
  <body>
    <script>
    window.addEventListener("message", (event) => {
    if (event.data.type === "EXPORT_TO_SHEETS") {
      google.script.run.exportTableToSheet(event.data.payload);
    }
  });
    </script>
    <iframe src="http://localhost:3000/login" height="100%" width="100%"></iframe>
  </body>
</html>
