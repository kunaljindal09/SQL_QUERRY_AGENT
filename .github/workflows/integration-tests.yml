name: Integration Tests

on:
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  integration-tests:
    name: Full Integration Tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}

    # MySQL Service Container (auto-started, auto-stopped)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD || 'root' }}
          MYSQL_DATABASE: sql_query_agent_test
          MYSQL_HOST_AUTH_METHOD: mysql_native_password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Step 3: Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pytest pytest-asyncio aiomysql

      # Step 4: Wait for MySQL to be ready
      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p${{ secrets.DB_ROOT_PASSWORD || 'root' }} --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          if [ $i -eq 30 ]; then
            echo "MySQL failed to start"
            exit 1
          fi

      # Step 5: Setup environment file
      - name: Setup environment file
        run: |
          cd backend
          cp .env.example .env
          sed -i 's|APP_DATABASE_URL=.*|APP_DATABASE_URL=mysql+aiomysql://root:${{ secrets.DB_ROOT_PASSWORD || 'root' }}@127.0.0.1:3306/sql_query_agent_test|' .env
          sed -i 's|DEFAULT_TARGET_DB_URL=.*|DEFAULT_TARGET_DB_URL=mysql+aiomysql://root:${{ secrets.DB_ROOT_PASSWORD || 'root' }}@127.0.0.1:3306/sql_query_agent_test|' .env
          sed -i 's|SECRET_KEY=.*|SECRET_KEY=integration-test-secret-key|' .env
          sed -i 's|LLAMA_BASE_URL=.*|LLAMA_BASE_URL=http://127.0.0.1:11434|' .env

      # Step 6: Run Alembic migrations (create schema)
      - name: Run database migrations
        run: |
          cd backend
          alembic upgrade head

      # Step 7: Run integration tests with real database
      - name: Run integration tests
        env:
          TEST_DATABASE_URL: mysql+aiomysql://root:${{ secrets.DB_ROOT_PASSWORD || 'root' }}@127.0.0.1:3306/sql_query_agent_test
          APP_DATABASE_URL: mysql+aiomysql://root:${{ secrets.DB_ROOT_PASSWORD || 'root' }}@127.0.0.1:3306/sql_query_agent_test
        run: |
          cd backend
          pytest tests/test_database_integration.py -v --tb=short

      # Step 8: Run performance tests
      - name: Run performance tests
        env:
          TEST_DATABASE_URL: mysql+aiomysql://root:${{ secrets.DB_ROOT_PASSWORD || 'root' }}@127.0.0.1:3306/sql_query_agent_test
        run: |
          cd backend
          pytest tests/test_performance.py -v --tb=short --durations=0

      # Step 9: Run load tests (if locust is available)
      - name: Run load tests
        run: |
          if [ -f "backend/locust_config.conf" ]; then
            cd backend
            pip install locust
            locust --config locust_config.conf --headless --run-time 30s --users 10 --spawn-rate 2
          else
            echo "Load tests not configured, skipping..."
          fi
        continue-on-error: true

      # Step 10: Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            backend/.pytest_cache/
            backend/test-results/
          retention-days: 30

      # Step 11: Generate test report
      - name: Generate test report
        if: always()
        run: |
          echo "## 🔗 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Database Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MySQL connectivity verified" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Schema migrations completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CRUD operations tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Response times validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Memory usage monitored" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Concurrent operations tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test results uploaded as artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Performance metrics available" >> $GITHUB_STEP_SUMMARY
